<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBuddy | Flashcards</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #ffdeeb;
            --soft-purple: #e2dffb;
            --soft-blue: #d0f4f9;
            --accent: #7c67ff;
            --text: #4a4a68;
            --white: #ffffff;
            --neon-pink: #ff007f;
            --neon-blue: #00f2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
       
        html, body{
            width: 100%;
            min-width: 100vh;
        }
        body {
            
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
            background: url(bgblur.jpg);
            backdrop-filter: blur(30px);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            
        }
        .cotent{
            height: 2000px;
            padding: 50px;
        }
       

       nav {
            top: 0;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 1.2rem 8%;
            background: black;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        nav ul{
            flex:1;
            text-align: right;
            margin-right:30px;
            
        }
        .navlogo{
            display: flex;
            align-items: center;
            gap: 10px;}
         .logo{
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-style: italic;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0,242,255,0.3));
         }
         .topic{
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-style: italic;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0,242,255,0.3));
            
            
         }
         .counter { 
            background: var(--soft-purple);
             padding: 5px 15px;
              border-radius: 20px; 
              font-size: 0.9rem;
               font-weight: 700; 
               
            }

        /* --- Input Section --- */
        .input-container {
            max-width: 800px;
            margin: 3rem auto;
            background: var(--dark);
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 10px 0px #f0f0f5;
            border: 2px solid #f0f0f5;
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            align-items: end;
        }
        .input-stack {
    display: flex;
    flex-direction: column; /* This puts Answer under Question */
    gap: 20px;             /* Space between Question and Answer rows */
    flex: 1;       
    flex-grow: 1;        /* Takes up available space */
}

        .field-group { display: flex; flex-direction: column; gap: 10px; }
        .field-group label { 
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
        }

        
            textarea {
            width: 100%;
            height: 100px;
            background: white;
            border: 3px solid rgba(197, 160, 89, 0.4);
            border-radius: 15px;
            color:black;
            padding: 15px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            resize: none;
            transition: 0.3s;
        }

        textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: #f8dc50;
            box-shadow: 0 0 15px rgba(241, 229, 172, 0.2);
        }


        .btn-add {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap; /* Keeps text on one line */
        }
        .btn-add:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(124, 103, 255, 0.3); }

        /* --- Flashcard Grid --- */
        .deck {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            padding: 0 8%;
        }

        .card-box {
            position: relative;
            height: 320px; /* Uno Proportions */
            perspective: 1000px;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .card-box.flipped .card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            border: 5px solid var(--white);
        }

        .front { background: var(--soft-blue); color: #2d5a61; }
        .back { background: var(--soft-purple); color: #4b457e; transform: rotateY(180deg); }

        /* --- Buttons --- */
        .controls {
            position: absolute;
            top: -10px;
            right: -10px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .icon-btn {
            width: 35px;
            height: 35px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-size: 1rem;
            transition: 0.2s;
        }

        .edit-btn { background: var(--white); color: var(--accent); }
        .close-btn { background: #ff708a; color: white; }
        .icon-btn:hover { transform: scale(1.1); }

    </style>
</head>
<body>

     <nav id="navbar">
        <div class="navlogo">
            <image src="love.svg" alt="FlashLearn Logo" style="width: 150px; height: 100px;"></image>
        <h1 class="logo">StudyBuddy</h1></div>
        <header style="margin: align-center;"><h1 class="topic">Flashcard Generator</h1></header>
        <div class="counter" id="count">0 Cards</div>
    </nav>

    <div class="input-container">
        <div class="input-stack">
        <div class="field-group">
            <label style="color:black;">QUESTION</label>
            <textarea id="q" placeholder="Type the question here..." autocomplete="off"></textarea>
        </div>
        <div class="field-group">
            <label style="color:black;">ANSWER</label>
            <textarea id="a" placeholder="Type the answer here..." autocomplete="off"></textarea>
        </div>
        </div></br>
        <button class="btn-add" onclick="saveCard()">Add Card</button>
    </div>

    <div class="deck" id="deck"></div>
     <script type="module" src="app.js"></script>

    <script>
        let cards = [];
        let editId = null;

        const qInput = document.getElementById('q');
        const aInput = document.getElementById('a');
        const deck = document.getElementById('deck');
        const countDisplay = document.getElementById('count');

        function saveCard() {
            const q = qInput.value.trim();
            const a = aInput.value.trim();
            if (!q) return;

            if (editId !== null) {
                cards = cards.map(c => c.id === editId ? { ...c, q, a } : c);
                editId = null;
                document.querySelector('.btn-add').innerText = "Add Card";
            } else {
                cards.push({ id: Date.now(), q, a });
            }

            qInput.value = "";
            aInput.value = "";
            render();
        }

        function render() {
            deck.innerHTML = "";
            countDisplay.innerText = `${cards.length} Cards`;

            cards.forEach(card => {
                const container = document.createElement('div');
                container.className = 'card-box';
                container.innerHTML = `
                    <div class="controls">
                        <button class="icon-btn edit-btn" onclick="startEdit(${card.id})">✎</button>
                        <button class="icon-btn close-btn" onclick="removeCard(${card.id})">✕</button>
                    </div>
                    <div class="card-inner" onclick="this.parentElement.classList.toggle('flipped')">
                        <div class="card-face front">${card.q}</div>
                        <div class="card-face back">${card.a || "..."}</div>
                    </div>
                `;
                deck.appendChild(container);
            });
        }

        function removeCard(id) {
            // Instant disappearance
            cards = cards.filter(c => c.id !== id);
            render();
        }

        function startEdit(id) {
            const card = cards.find(c => c.id === id);
            qInput.value = card.q;
            aInput.value = card.a;
            editId = id;
            document.querySelector('.btn-add').innerText = "Update";
            window.scrollTo({ top: 0, behavior: 'smooth' });
            qInput.focus();
        }

        // Add with Enter key
        [qInput, aInput].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') saveCard();
            });
        });
    </script>
</body>
</html>
